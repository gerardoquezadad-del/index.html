        errorMsg.classList.remove('hidden');
        document.getElementById('pass').value = '';

        let carrito = [];

        function renderCatalogo() {
            const search = document.getElementById('search').value.toLowerCase();
            const lista = document.getElementById('lista-catalogo');
            lista.innerHTML = '';

            DB.filter(p => p.n.toLowerCase().includes(search)).forEach(p => {
                const gana = p.v - p.c;
                const porc = p.c > 0 ? ((gana / p.c) * 100).toFixed(0) : 0;
                
                lista.innerHTML += `
                    <tr class="border-b hover:bg-stone-50 transition-colors">
                        <td class="p-4 font-medium">${p.n}</td>
                        <td class="p-4 text-stone-400 font-mono">$${p.c}</td>
                        <td class="p-4 font-bold text-green-700 font-mono">$${p.v}</td>
                        <td class="p-4 text-blue-600 font-bold font-mono">$${gana}</td>
                        <td class="p-4"><span class="bg-green-100 text-green-700 px-2 py-1 rounded-lg text-xs font-black">${porc}%</span></td>
                        <td class="p-4 text-center">
                            <button onclick="agregarAlCarrito('${p.n}', ${p.v}, ${gana})" class="bg-green-600 text-white p-2 rounded-xl active:scale-90"><i class="fas fa-plus"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        function agregarAlCarrito(nombre, precio, ganancia) {
            const item = carrito.find(i => i.nombre === nombre);
            if (item) { item.cant++; } 
            else { carrito.push({ nombre, precio, ganancia, cant: 1 }); }
            actualizarBoleta();
        }

        function actualizarBoleta() {
            const cont = document.getElementById('carrito-items');
            let total = 0;
            let gananciaTotal = 0;
            cont.innerHTML = '';

            carrito.forEach((item, index) => {
                const sub = item.precio * item.cant;
                total += sub;
                gananciaTotal += (item.ganancia * item.cant);
                cont.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-4 rounded-2xl border border-stone-100 shadow-sm">
                        <div><p class="font-black text-stone-800">${item.nombre}</p><p class="text-[10px] font-bold text-stone-400 italic">${item.cant} UN x $${item.precio}</p></div>
                        <div class="flex items-center gap-4"><span class="font-mono font-black text-green-700">$${sub}</span><button onclick="eliminar(${index})" class="text-stone-200 hover:text-red-500"><i class="fas fa-times-circle text-lg"></i></button></div>
                    </div>
                `;
            });
                        document.getElementById('total-boleta').innerText = `$${total.toLocaleString('es-CL')}`;
            document.getElementById('ganancia-boleta').innerText = `$${gananciaTotal.toLocaleString('es-CL')}`;
        }

        function eliminar(idx) { 
            carrito.splice(idx, 1); 
            actualizarBoleta(); 
        }

        function vaciarCarrito() { 
            if(confirm("¿Vaciar todo el pedido?")) { 
                carrito = []; 
                actualizarBoleta(); 
            } 
        }

            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.getElementById('btn-cat').classList.toggle('btn-active', t === 'catalogo');
            document.getElementById('btn-bol').classList.toggle('btn-active', t === 'boleta');
        }

        function enviarWhatsApp() {
            if (carrito.length === 0) {
                alert("El carrito está vacío");
                return;
            }
            let m = "🌿 *AROMAS DEL CAMPO* 🌿%0A";
            let total = 0;
            carrito.forEach(i => {
                m += `📍 *${i.nombre}* (${i.cant}x$${i.precio}) = *$${(i.precio * i.cant).toLocaleString('es-CL')}*%0A`;
                total += i.precio * i.cant;
            });
            m += `%0A💰 *TOTAL: $${total.toLocaleString('es-CL')}*`;
            window.open(`https://wa.me/?text=${m}`);
        }
function cerrarSesion() {
    // 1. Ocultar el contenido de la app
    document.getElementById('app-content').classList.add('hidden');
    
    // 2. Mostrar la pantalla de login
    document.getElementById('login-screen').classList.remove('hidden');
    
    // 3. Limpiar los campos de usuario y clave por seguridad
    document.getElementById('user').value = '';
    document.getElementById('pass').value = '';
    
    // 4. Ocultar mensaje de error si existía
    document.getElementById('login-error').classList.add('hidden');
}
